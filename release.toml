# Configuration for `cargo release` (https://github.com/crate-ci/cargo-release).
#
# Release procedure:
#
#   1. Make sure CHANGELOG.md's [Unreleased] section reflects everything
#      since the last release, and Cargo.toml's `version` still matches
#      that last release (see note below on why it must).
#   2. cargo release <level>            # e.g. `patch`/`minor`/`major` — dry run
#   3. Review the diff it prints, then: cargo release <level> --execute
#      This bumps Cargo.toml's version, moves [Unreleased] under a new
#      version heading in CHANGELOG.md, commits, tags, and pushes
#      (publish = false below — it does NOT publish to crates.io; run
#      `cargo publish` yourself once you're ready).
#
# IMPORTANT: do not bump Cargo.toml to a "next dev version" after a
# release. Leave it at the version you just released. `cargo release`
# computes the changelog's compare-link `prev_version` from Cargo.toml's
# *current* version before bumping it — if that's already been advanced
# to the next dev version, the next release's `prev_version` equals its
# own target version, producing a broken self-compare link (e.g.
# `compare/0.3.1...0.3.1`). Leaving Cargo.toml at the last released
# version is what lets cargo-release compute a correct prev_version on
# the next run.

publish = false
push = true

# Matches this repo's existing tag convention (e.g. "0.2.1", not "v0.2.1").
tag-name = "{{version}}"
tag-message = "Release {{version}}"
pre-release-commit-message = "Release {{version}}"

# Move the [Unreleased] section's contents under a new version heading,
# and leave a fresh, empty [Unreleased] section above it.
[[pre-release-replacements]]
file = "CHANGELOG.md"
search = "## \\[Unreleased\\]"
replace = "## [Unreleased]\n\n## [{{version}}] - {{date}}"
exactly = 1

# Keep the link-reference section at the bottom of CHANGELOG.md in sync.
[[pre-release-replacements]]
file = "CHANGELOG.md"
search = "\\[Unreleased\\]: https://github.com/peterpaul/assert4rs/compare/.*\\.\\.\\.HEAD"
replace = """
[Unreleased]: https://github.com/peterpaul/assert4rs/compare/{{version}}...HEAD
[{{version}}]: https://github.com/peterpaul/assert4rs/compare/{{prev_version}}...{{version}}"""
exactly = 1
